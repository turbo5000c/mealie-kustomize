apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mealie

resources:
  - namespace.yaml
  - configmap.yaml
  # secret.yaml is commented out by default so that plain-text credentials are
  # never accidentally committed and applied. Create the Secret separately using
  # one of the following approaches:
  #
  #   Option A — manual one-time apply (simplest):
  #     cp examples/secret.yaml secret.yaml
  #     # Edit secret.yaml with real base64-encoded values, then:
  #     kubectl apply -f secret.yaml
  #
  #   Option B — secrets manager (recommended for GitOps):
  #     Use Sealed Secrets, External Secrets Operator, or SOPS, and add the
  #     resulting encrypted secret resource here.
  #
  # - secret.yaml
  - deployment.yaml
  - pvc.yaml
  - service.yaml
