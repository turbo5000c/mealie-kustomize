# Non-sensitive Mealie configuration.
# Edit these values before applying the manifests.
# See: https://docs.mealie.io/documentation/getting-started/installation/backend-config/
apiVersion: v1
kind: ConfigMap
metadata:
  name: mealie-config
  namespace: mealie
data:
  # Set to "true" to allow anyone to register. "false" restricts new accounts to admin invite.
  ALLOW_SIGNUP: "false"

  # IANA timezone name. Used for scheduled tasks (e.g. America/Chicago, Europe/London).
  TZ: "America/New_York"

  # Public URL of your Mealie instance (must match what users/Home Assistant will use).
  BASE_URL: "https://mealie.yourdomain.com"

  # Database engine. Use "postgres" for PostgreSQL or remove this key to use SQLite.
  DB_ENGINE: "postgres"

  # PostgreSQL connection details (ignored when DB_ENGINE is not "postgres").
  POSTGRES_SERVER: "your-remote-postgres-server"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "mealie"
