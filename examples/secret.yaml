apiVersion: v1
kind: Secret
metadata:
  name: mealie-database-secret
  namespace: mealie
type: Opaque
data:
  # Base64-encoded PostgreSQL username
  # Generate: echo -n 'your-username' | base64
  POSTGRES_USER: REPLACE_WITH_BASE64_ENCODED_USERNAME

  # Base64-encoded PostgreSQL password
  # Generate: echo -n 'your-password' | base64
  POSTGRES_PASSWORD: REPLACE_WITH_BASE64_ENCODED_PASSWORD
