# Mealie database credentials.
# Values MUST be base64-encoded. Generate with: echo -n 'value' | base64
#
# This file is intentionally excluded from kustomization.yaml — apply it
# manually or replace it with a secrets-manager resource (Sealed Secrets, ESO).
#
# DO NOT commit real credentials to source control.
apiVersion: v1
kind: Secret
metadata:
  name: mealie-database-secret
  namespace: mealie
type: Opaque
data:
  # Base64 of your PostgreSQL username (default example encodes "mealie")
  POSTGRES_USER: bWVhbGll
  # Base64 of your PostgreSQL password (default example encodes "mealie" — CHANGE THIS)
  POSTGRES_PASSWORD: bWVhbGll
